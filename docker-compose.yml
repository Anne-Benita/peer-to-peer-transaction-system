version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: p2p_postgres
    restart: always
    environment:
      POSTGRES_USER: p2p_admin
      POSTGRES_PASSWORD: p2p_secure_pass
      POSTGRES_DB: p2p_wallet
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
